# nginx reverse-proxy config for EgressView MCP Server
#
# Prerequisites:
#   1. Start the MCP server on EC2:
#        MCP_PORT=3010 \
#        EGRESSVIEW_URL=http://localhost:3002 \
#        EGRESSVIEW_TOKEN=<your-admin-token> \
#        node /path/to/egressview/mcp-server.js
#
#   2. (Optional) run as a systemd service — see below.
#
#   3. Add the location block below to your existing nginx server{} block
#      (the same one that already proxies EgressView on port 3002).
#
# Claude Desktop config (~/.claude/claude_desktop_config.json):
#   {
#     "mcpServers": {
#       "egressview": {
#         "url": "https://your-domain-or-ip/mcp",
#         "headers": { "X-Admin-Token": "your-admin-token" }
#       }
#     }
#   }

# ─── Add inside your existing server {} block ─────────────────────────────────

location /mcp {
    proxy_pass         http://127.0.0.1:3010;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MCP Streamable HTTP requires both content types in Accept
    proxy_set_header Accept            "application/json, text/event-stream";

    # Required for Server-Sent Events (GET /mcp streaming responses)
    proxy_set_header Connection  '';
    proxy_buffering              off;
    proxy_cache                  off;
    proxy_read_timeout           3600s;  # keep SSE stream open up to 1h
    chunked_transfer_encoding    on;
}

# ─── Optional: systemd service (/etc/systemd/system/egressview-mcp.service) ───
#
# [Unit]
# Description=EgressView MCP Server
# After=network.target egressview.service
#
# [Service]
# Type=simple
# User=ec2-user
# WorkingDirectory=/home/ec2-user/egressview
# Environment=MCP_PORT=3010
# Environment=EGRESSVIEW_URL=http://localhost:3002
# EnvironmentFile=/home/ec2-user/egressview/.env.mcp
# ExecStart=/usr/bin/node /home/ec2-user/egressview/mcp-server.js
# Restart=on-failure
# RestartSec=5
#
# [Install]
# WantedBy=multi-user.target
#
# .env.mcp (chmod 600):
#   EGRESSVIEW_TOKEN=your-admin-token
#   MCP_TOKEN=your-admin-token   # optional: separate token for MCP endpoint
