name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

jobs:
  test:
    name: Unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  security:
    name: Release safety checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production dependencies
        run: npm run security:audit

      - name: Secret scan
        run: npm run security:secrets

  smoke:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    # Run on schedule, manual dispatch, and on every push/PR (uses demo mode so no hardware needed)
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start EgressView (demo mode)
        run: |
          DEMO_MODE=true DEMO_ADMIN_TOKEN=demo-token-ci PORT=3002 npm start > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:3002 > /dev/null; then exit 0; fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Run smoke tests
        env:
          EGRESSVIEW_URL: http://localhost:3002
          EGRESSVIEW_TOKEN: demo-token-ci
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
            server.log
          if-no-files-found: ignore
          retention-days: 7
