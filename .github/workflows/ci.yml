name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  security:
    name: ASH Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git

      - name: Run ASH scan
        run: ash --mode local

      - name: Check actionable findings
        run: |
          ACTIONABLE=$(jq '.metadata.summary_stats.actionable' .ash/ash_output/ash_aggregated_results.json)
          echo "Actionable findings: $ACTIONABLE"
          if [ "$ACTIONABLE" -gt 0 ]; then
            echo "::error::ASH found $ACTIONABLE actionable security findings"
            jq '.runs[].results[]' .ash/ash_output/reports/ash.sarif
            exit 1
          fi
